<!-- バージョン4：左右からカードが閉まるように合体して埋まる。文字部分はずっと透ける -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutout - Curtain</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(120deg, #ff5f6d, #ffc371, #47cf73, #4facfe, #a06bff, #ff5f6d);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage { position: relative; width: 600px; height: 360px; }

        .card { width: 100%; height: 100%; display: block;
            filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35)); }

        .left  { transform: translateX(-310px); animation: slideR 1.4s cubic-bezier(0.65,0,0.35,1) 0.3s both; }
        .right { transform: translateX(310px);  animation: slideL 1.4s cubic-bezier(0.65,0,0.35,1) 0.3s both; }
        @keyframes slideR {
            0% { transform: translateX(-310px); }
            85% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
        @keyframes slideL {
            0% { transform: translateX(310px); }
            85% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }

        .hint { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.85); font-size: 14px; letter-spacing: 0.08em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3); user-select: none; }
    </style>
</head>

<body>
    <div class="stage">
        <svg class="card" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <mask id="textHole">
                    <rect x="0" y="0" width="600" height="360" rx="24" fill="white" />
                    <text x="300" y="205" text-anchor="middle" font-size="118" font-weight="800"
                          font-family="'Helvetica Neue', Arial, sans-serif" fill="black">SPLIT</text>
                </mask>
                <clipPath id="round"><rect x="0" y="0" width="600" height="360" rx="24" /></clipPath>
                <linearGradient id="gL" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#36d1dc" /><stop offset="100%" stop-color="#5b86e5" />
                </linearGradient>
                <linearGradient id="gR" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#5b86e5" /><stop offset="100%" stop-color="#9d50bb" />
                </linearGradient>
            </defs>

            <g mask="url(#textHole)" clip-path="url(#round)">
                <!-- 左半分・右半分が中央で合体 -->
                <rect class="left"  x="0"   y="0" width="300" height="360" fill="url(#gL)" />
                <rect class="right" x="300" y="0" width="300" height="360" fill="url(#gR)" />
            </g>
        </svg>
        <p class="hint">クリックでもう一度</p>
    </div>

    <script>
        const stage = document.querySelector('.stage');
        const targets = stage.querySelectorAll('.left, .right');
        stage.addEventListener('click', () => {
            targets.forEach(t => { t.style.animation = 'none'; });
            void stage.getBoundingClientRect();
            targets.forEach(t => { t.style.animation = ''; });
        });
    </script>
</body>
</html>
