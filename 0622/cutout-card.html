<!-- 文字の透ける窓は固定。その裏を穴のない色付きカードが落ちてきて、文字部分だけずっと透ける -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutout Card Animation</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* 文字の窓から透けて見える背景（動く虹色グラデーション） */
            background: linear-gradient(120deg, #ff5f6d, #ffc371, #47cf73, #4facfe, #a06bff, #ff5f6d);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage {
            position: relative;
            width: 600px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* カードの枠（マスクは常に固定。文字部分がくり抜かれている） */
        .card {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35));
        }

        /* 落ちてくる「穴のない」色付きの面。マスクは動かず、これだけが落下する */
        .fill {
            transform: translateY(-360px);
            animation: drop 1.7s cubic-bezier(0.18, 0.9, 0.25, 1) 0.4s both;
        }

        @keyframes drop {
            0%   { transform: translateY(-360px); }
            60%  { transform: translateY(0); }
            /* 着地後に軽くバウンド */
            74%  { transform: translateY(-22px); }
            88%  { transform: translateY(0); }
            94%  { transform: translateY(-7px); }
            100% { transform: translateY(0); }
        }

        .hint {
            position: absolute;
            bottom: 24px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            letter-spacing: 0.08em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            user-select: none;
        }
    </style>
</head>

<body>

    <div class="stage">
        <!-- viewBox は固定。mask(文字の窓) も固定で、.fill だけが落下する -->
        <svg class="card" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- luminance マスク：白=カードが見える / 黒=文字の窓（透明・背景が透ける） -->
                <mask id="textHole">
                    <rect x="0" y="0" width="600" height="360" rx="24" fill="white" />
                    <text x="300" y="200" text-anchor="middle"
                          font-family="'Helvetica Neue', Arial, sans-serif"
                          font-size="150" font-weight="800" fill="black">HELLO</text>
                </mask>

                <!-- カードの色（ガラスっぽい白） -->
                <linearGradient id="cardColor" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#eef2ff" />
                </linearGradient>
            </defs>

            <!-- マスクは g(固定) に掛ける。中の .fill が落下しても窓は動かない -->
            <g mask="url(#textHole)">
                <rect class="fill" x="0" y="0" width="600" height="360" rx="24"
                      fill="url(#cardColor)" />
            </g>
        </svg>

        <p class="hint">クリックでもう一度</p>
    </div>

    <script>
        // クリックで落下アニメーションを再生
        const fill = document.querySelector('.fill');
        document.querySelector('.stage').addEventListener('click', () => {
            fill.style.animation = 'none';
            void fill.getBoundingClientRect(); // リフロー強制
            fill.style.animation = '';
        });
    </script>
</body>

</html>
