<!-- 上から落ちてくる色付きカードに、文字の形だけ穴が空いて背景が透けるアニメーション -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutout Card Animation</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* カードの穴から透けて見える背景（動く虹色グラデーション） */
            background: linear-gradient(120deg, #ff5f6d, #ffc371, #47cf73, #4facfe, #a06bff, #ff5f6d);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage {
            position: relative;
            width: 600px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 落ちてくる色付きカード（文字部分がくり抜かれている） */
        .card {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 24px;
            filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35));
            /* 上から落下 → 軽くバウンド */
            transform-origin: center bottom;
            animation: drop 1.6s cubic-bezier(0.18, 0.9, 0.25, 1) 0.4s both;
        }

        @keyframes drop {
            0% {
                transform: translateY(-130%) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            60% {
                transform: translateY(0) scaleY(1);
            }
            /* 着地のつぶれ */
            72% {
                transform: translateY(0) scaleY(0.9) scaleX(1.04);
            }
            85% {
                transform: translateY(0) scaleY(1.03) scaleX(0.99);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        .hint {
            position: absolute;
            bottom: 24px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            letter-spacing: 0.08em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            user-select: none;
        }
    </style>
</head>

<body>

    <div class="stage">
        <!-- SVG カード本体。mask の黒い文字部分が「穴」になり背景が透ける -->
        <svg class="card" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- luminance マスク：白=カードが見える / 黒=くり抜き（透明） -->
                <mask id="textHole">
                    <rect x="0" y="0" width="600" height="360" rx="24" fill="white" />
                    <text x="300" y="200" text-anchor="middle"
                          font-family="'Helvetica Neue', Arial, sans-serif"
                          font-size="150" font-weight="800" fill="black">HELLO</text>
                </mask>

                <!-- カードの色（ガラスっぽい白） -->
                <linearGradient id="cardColor" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#eef2ff" />
                </linearGradient>
            </defs>

            <rect x="0" y="0" width="600" height="360" rx="24"
                  fill="url(#cardColor)" mask="url(#textHole)" />
        </svg>

        <p class="hint">クリックでもう一度</p>
    </div>

    <script>
        // クリックで落下アニメーションを再生
        const card = document.querySelector('.card');
        document.querySelector('.stage').addEventListener('click', () => {
            card.style.animation = 'none';
            // リフロー強制で再生し直す
            void card.offsetWidth;
            card.style.animation = '';
        });
    </script>
</body>

</html>
