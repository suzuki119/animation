<!-- バージョン3：複数の色カードが順番に落ちて重なる。最前面の色だけが見え、文字はずっと透ける -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutout - Stack</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(120deg, #ff5f6d, #ffc371, #47cf73, #4facfe, #a06bff, #ff5f6d);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage { position: relative; width: 600px; height: 360px; }

        .card { width: 100%; height: 100%; display: block;
            filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35)); }

        .layer { transform: translateY(-380px); }
        .l1 { animation: drop 0.9s cubic-bezier(0.18,0.9,0.25,1) 0.3s both; }
        .l2 { animation: drop 0.9s cubic-bezier(0.18,0.9,0.25,1) 0.9s both; }
        .l3 { animation: drop 0.9s cubic-bezier(0.18,0.9,0.25,1) 1.5s both; }
        @keyframes drop {
            0%   { transform: translateY(-380px); }
            70%  { transform: translateY(0); }
            84%  { transform: translateY(-16px); }
            100% { transform: translateY(0); }
        }

        .hint { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.85); font-size: 14px; letter-spacing: 0.08em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3); user-select: none; }
    </style>
</head>

<body>
    <div class="stage">
        <svg class="card" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <mask id="textHole">
                    <rect x="0" y="0" width="600" height="360" rx="24" fill="white" />
                    <text x="300" y="205" text-anchor="middle" font-size="130" font-weight="800"
                          font-family="'Helvetica Neue', Arial, sans-serif" fill="black">STACK</text>
                </mask>
            </defs>

            <g mask="url(#textHole)">
                <!-- 3枚が順番に落ちて重なる。後の色が前の色を上書きしていく -->
                <rect class="layer l1" x="0" y="0" width="600" height="360" rx="24" fill="#ff8a5c" />
                <rect class="layer l2" x="0" y="0" width="600" height="360" rx="24" fill="#ff5fa2" />
                <rect class="layer l3" x="0" y="0" width="600" height="360" rx="24" fill="#7b6cff" />
            </g>
        </svg>
        <p class="hint">クリックでもう一度</p>
    </div>

    <script>
        const stage = document.querySelector('.stage');
        const targets = stage.querySelectorAll('.layer');
        stage.addEventListener('click', () => {
            targets.forEach(t => { t.style.animation = 'none'; });
            void stage.getBoundingClientRect();
            targets.forEach(t => { t.style.animation = ''; });
        });
    </script>
</body>
</html>
