<!-- バージョン5：斜めの色帯が次々スワイプして画面を塗りつぶす。文字部分はずっと透ける -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutout - Wipe</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(120deg, #ff5f6d, #ffc371, #47cf73, #4facfe, #a06bff, #ff5f6d);
            background-size: 300% 300%;
            animation: bgShift 12s ease infinite;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stage { position: relative; width: 600px; height: 360px; }

        .card { width: 100%; height: 100%; display: block;
            filter: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.35)); }

        /* 斜めの帯が左下→右上方向へスワイプして入ってくる */
        .band { transform: translate(-820px, 0); }
        .b1 { animation: wipe 1.0s cubic-bezier(0.5,0,0.2,1) 0.30s both; }
        .b2 { animation: wipe 1.0s cubic-bezier(0.5,0,0.2,1) 0.45s both; }
        .b3 { animation: wipe 1.0s cubic-bezier(0.5,0,0.2,1) 0.60s both; }
        .b4 { animation: wipe 1.0s cubic-bezier(0.5,0,0.2,1) 0.75s both; }
        @keyframes wipe {
            0%   { transform: translate(-820px, 0); }
            100% { transform: translate(0, 0); }
        }

        .hint { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.85); font-size: 14px; letter-spacing: 0.08em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3); user-select: none; }
    </style>
</head>

<body>
    <div class="stage">
        <svg class="card" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <mask id="textHole">
                    <rect x="0" y="0" width="600" height="360" rx="24" fill="white" />
                    <text x="300" y="205" text-anchor="middle" font-size="120" font-weight="800"
                          font-family="'Helvetica Neue', Arial, sans-serif" fill="black">WIPE</text>
                </mask>
                <clipPath id="round"><rect x="0" y="0" width="600" height="360" rx="24" /></clipPath>
            </defs>

            <g mask="url(#textHole)" clip-path="url(#round)">
                <!-- 平行四辺形の帯を少しずつずらして重ねる（skewX相当に手で傾けた形） -->
                <polygon class="band b1" points="0,0 200,0 120,360 -80,360"   fill="#ff6a88" />
                <polygon class="band b2" points="200,0 400,0 320,360 120,360" fill="#ff99ac" />
                <polygon class="band b3" points="400,0 600,0 520,360 320,360" fill="#a18cd1" />
                <polygon class="band b4" points="600,0 820,0 740,360 520,360" fill="#6a82fb" />
            </g>
        </svg>
        <p class="hint">クリックでもう一度</p>
    </div>

    <script>
        const stage = document.querySelector('.stage');
        const targets = stage.querySelectorAll('.band');
        stage.addEventListener('click', () => {
            targets.forEach(t => { t.style.animation = 'none'; });
            void stage.getBoundingClientRect();
            targets.forEach(t => { t.style.animation = ''; });
        });
    </script>
</body>
</html>
